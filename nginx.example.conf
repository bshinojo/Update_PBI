# Config de ejemplo para servir el build estático (dist/) en un VPS Linux.
# Copiá el contenido de `dist/` a la carpeta `root` indicada abajo.
server {
    listen 80;
    server_name _;

    root /var/www/pbi-refresh-scheduler;  # acá va el contenido de dist/
    index index.html;

    # SPA: cualquier ruta desconocida cae en index.html (evita 404 al refrescar).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend FastAPI (ver backend/): el frontend habla con él vía /api. Descomentar.
    # La barra final en proxy_pass quita el prefijo /api: el backend ve /workspaces.
    # location /api/ {
    #     proxy_pass http://127.0.0.1:8000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }

    # Cache larga para los assets con hash en el nombre.
    location ~* \.(?:js|css|svg|woff2?|png|jpg|ico)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }
}
