<!doctype html>
<!-- @dsCard group="Brand" name="Iconography — Lucide" subtitle="1.5px stroke, navy, paired with labels" viewport="700x220" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
  <div class="label">Lucide · 1.5px stroke · navy / currentColor</div>
  <div style="display:flex; gap:18px; align-items:center; color:#0E2543; padding:10px 0;">
    <i data-lucide="trending-up" style="width:24px; height:24px;"></i>
    <i data-lucide="briefcase" style="width:24px; height:24px;"></i>
    <i data-lucide="bar-chart-3" style="width:24px; height:24px;"></i>
    <i data-lucide="line-chart" style="width:24px; height:24px;"></i>
    <i data-lucide="building-2" style="width:24px; height:24px;"></i>
    <i data-lucide="handshake" style="width:24px; height:24px;"></i>
    <i data-lucide="file-text" style="width:24px; height:24px;"></i>
    <i data-lucide="calculator" style="width:24px; height:24px;"></i>
    <i data-lucide="users" style="width:24px; height:24px;"></i>
    <i data-lucide="shield-check" style="width:24px; height:24px;"></i>
    <i data-lucide="arrow-right" style="width:24px; height:24px;"></i>
  </div>
  <hr class="sep">
  <div style="display:flex; gap:14px; align-items:center;">
    <div style="display:inline-flex; align-items:center; gap:8px; color:#0E2543; font-family:'Inter'; font-size:13px; font-weight:500;">
      <i data-lucide="trending-up" style="width:16px; height:16px;"></i> 16
    </div>
    <div style="display:inline-flex; align-items:center; gap:8px; color:#0E2543; font-family:'Inter'; font-size:14px; font-weight:500;">
      <i data-lucide="trending-up" style="width:20px; height:20px;"></i> 20 (default)
    </div>
    <div style="display:inline-flex; align-items:center; gap:8px; color:#0E2543; font-family:'Inter'; font-size:16px; font-weight:500;">
      <i data-lucide="trending-up" style="width:24px; height:24px;"></i> 24
    </div>
    <div style="display:inline-flex; align-items:center; gap:8px; color:#0E2543; font-family:'Inter'; font-size:18px; font-weight:500;">
      <i data-lucide="trending-up" style="width:32px; height:32px;"></i> 32
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
