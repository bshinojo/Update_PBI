<!doctype html>
<!-- @dsCard group="Components" name="Cards" subtitle="Editorial card + service card with top rule" viewport="700x220" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
    <!-- Editorial card -->
    <div style="background:#fff; border:1px solid #DEE2E8; border-radius:6px; box-shadow:0 1px 2px rgba(14,37,67,0.06); padding:18px;">
      <div style="font-family:'Inter'; font-weight:500; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:#6B7585;">Servicio</div>
      <div style="font-family:'EB Garamond',serif; font-weight:500; font-size:22px; line-height:1.2; color:#0E2543; margin-top:6px;">Valuación de Empresas</div>
      <div style="font-family:'Inter'; font-size:13px; line-height:1.55; color:#4A5363; margin-top:8px;">Calculamos el valor de tu compañía y te mostramos la sensibilidad a las variables clave.</div>
    </div>
    <!-- Service card with top rule -->
    <div style="background:#F7F6F2; border-top:2px solid #0E2543; padding:18px;">
      <div style="font-family:'EB Garamond',serif; font-weight:500; font-size:22px; line-height:1.2; color:#0E2543;">Tableros de Gestión</div>
      <ul style="list-style:none; padding:0; margin:10px 0 0; font-family:'Inter'; font-size:13px; line-height:1.8; color:#2D3540;">
        <li>Tablero de Ventas</li>
        <li>Tablero de Inventario</li>
        <li>Tablero de Resultados</li>
      </ul>
    </div>
  </div>
</body></html>
