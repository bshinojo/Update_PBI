<!doctype html>
<!-- @dsCard group="Components" name="Badges & KPI tiles" subtitle="Pill badges + dashboard KPI tile composition" viewport="700x300" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="label">Badges</div>
  <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px;">
    <span style="display:inline-flex; align-items:center; padding:3px 10px; border-radius:999px; background:#EDF3F8; color:#0E2543; font-weight:500; font-size:12px; letter-spacing:0.02em;">Empresas Familiares</span>
    <span style="display:inline-flex; align-items:center; padding:3px 10px; border-radius:999px; background:#0E2543; color:#F7F6F2; font-weight:500; font-size:12px;">M&amp;A</span>
    <span style="display:inline-flex; align-items:center; padding:3px 10px; border-radius:999px; border:1px solid #0E2543; color:#0E2543; font-weight:500; font-size:12px;">+30 años</span>
    <span style="display:inline-flex; align-items:center; padding:3px 10px; border-radius:999px; background:#FBEFD8; color:#B08B3F; font-weight:600; font-size:12px;">Destacado</span>
  </div>
  <div class="label">KPI Tile</div>
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
    <div style="background:#fff; border:1px solid #DEE2E8; border-radius:4px; padding:14px;">
      <div style="font-family:'Inter'; font-weight:500; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#6B7585;">Ventas Netas</div>
      <div style="font-family:'Inter',sans-serif; font-weight:700; font-size:30px; color:#0E2543; line-height:1.1; margin-top:8px; letter-spacing:-0.01em; font-variant-numeric:tabular-nums;">$ 184,2 M</div>
      <div style="font-family:'Inter'; font-weight:600; font-size:12px; color:#2E7D5B; margin-top:6px;">▲ +12,4% vs presup.</div>
    </div>
    <div style="background:#fff; border:1px solid #DEE2E8; border-radius:4px; padding:14px;">
      <div style="font-family:'Inter'; font-weight:500; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#6B7585;">Margen</div>
      <div style="font-family:'Inter',sans-serif; font-weight:700; font-size:30px; color:#0E2543; line-height:1.1; margin-top:8px; letter-spacing:-0.01em; font-variant-numeric:tabular-nums;">28,7 %</div>
      <div style="font-family:'Inter'; font-weight:600; font-size:12px; color:#B23C3C; margin-top:6px;">▼ −1,8 pp</div>
    </div>
    <div style="background:#fff; border:1px solid #DEE2E8; border-radius:4px; padding:14px;">
      <div style="font-family:'Inter'; font-weight:500; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#6B7585;">Días de Cobro</div>
      <div style="font-family:'Inter',sans-serif; font-weight:700; font-size:30px; color:#0E2543; line-height:1.1; margin-top:8px; letter-spacing:-0.01em; font-variant-numeric:tabular-nums;">42 d</div>
      <div style="font-family:'Inter'; font-weight:600; font-size:12px; color:#C98A1F; margin-top:6px;">● Estable</div>
    </div>
  </div>
</body></html>
