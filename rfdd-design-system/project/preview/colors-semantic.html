<!doctype html>
<!-- @dsCard group="Colors" name="Semantic — Pos / Neg / Warn" subtitle="Desaturated editorial signals for dashboards" viewport="700x230" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#2E7D5B"></div><span class="name">positive</span><span class="hex">#2E7D5B</span></div>
    <div class="swatch"><div class="chip" style="background:#E1EFE7; border:1px solid rgba(0,0,0,0.06)"></div><span class="name">pos / bg</span><span class="hex">#E1EFE7</span></div>
    <div class="swatch"><div class="chip" style="background:#B23C3C"></div><span class="name">negative</span><span class="hex">#B23C3C</span></div>
    <div class="swatch"><div class="chip" style="background:#F5E2E2; border:1px solid rgba(0,0,0,0.06)"></div><span class="name">neg / bg</span><span class="hex">#F5E2E2</span></div>
    <div class="swatch"><div class="chip" style="background:#C98A1F"></div><span class="name">warning</span><span class="hex">#C98A1F</span></div>
    <div class="swatch"><div class="chip" style="background:#FBEFD8; border:1px solid rgba(0,0,0,0.06)"></div><span class="name">warn / bg</span><span class="hex">#FBEFD8</span></div>
  </div>
  <hr class="sep">
  <div style="display:flex; gap:8px; align-items:center;">
    <span style="display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:999px; background:#E1EFE7; color:#2E7D5B; font-weight:600; font-size:12px;">▲ +12.4%</span>
    <span style="display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:999px; background:#F5E2E2; color:#B23C3C; font-weight:600; font-size:12px;">▼ −3.1%</span>
    <span style="display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:999px; background:#FBEFD8; color:#C98A1F; font-weight:600; font-size:12px;">● Atención</span>
    <span style="display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:999px; background:#EDF3F8; color:#1E3D6E; font-weight:600; font-size:12px;">i Info</span>
  </div>
</body></html>
