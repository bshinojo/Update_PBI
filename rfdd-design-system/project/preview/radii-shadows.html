<!doctype html>
<!-- @dsCard group="Spacing" name="Radii & Elevation" subtitle="Tight radii, navy-tinted shadow ramp" viewport="700x260" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="label">Radii</div>
  <div style="display:flex; gap:14px; align-items:flex-end; margin-bottom:20px;">
    <div style="text-align:center;"><div style="width:48px; height:48px; background:#EDF3F8; border:1px solid #C5DAE7;"></div><div class="hex" style="margin-top:6px;">none · 0</div></div>
    <div style="text-align:center;"><div style="width:48px; height:48px; background:#EDF3F8; border:1px solid #C5DAE7; border-radius:2px;"></div><div class="hex" style="margin-top:6px;">xs · 2</div></div>
    <div style="text-align:center;"><div style="width:48px; height:48px; background:#EDF3F8; border:1px solid #C5DAE7; border-radius:4px;"></div><div class="hex" style="margin-top:6px;">sm · 4</div></div>
    <div style="text-align:center;"><div style="width:48px; height:48px; background:#EDF3F8; border:1px solid #C5DAE7; border-radius:6px;"></div><div class="hex" style="margin-top:6px;">md · 6</div></div>
    <div style="text-align:center;"><div style="width:48px; height:48px; background:#EDF3F8; border:1px solid #C5DAE7; border-radius:10px;"></div><div class="hex" style="margin-top:6px;">lg · 10</div></div>
    <div style="text-align:center;"><div style="width:80px; height:32px; background:#EDF3F8; border:1px solid #C5DAE7; border-radius:999px;"></div><div class="hex" style="margin-top:6px;">pill</div></div>
  </div>
  <div class="label">Elevation</div>
  <div style="display:flex; gap:18px; padding:8px 4px 16px;">
    <div style="width:88px; height:60px; background:#fff; border-radius:6px; box-shadow:0 1px 2px rgba(14,37,67,0.06); display:flex; align-items:flex-end; justify-content:center; padding-bottom:4px;"><span class="hex">1</span></div>
    <div style="width:88px; height:60px; background:#fff; border-radius:6px; box-shadow:0 2px 8px rgba(14,37,67,0.08); display:flex; align-items:flex-end; justify-content:center; padding-bottom:4px;"><span class="hex">2</span></div>
    <div style="width:88px; height:60px; background:#fff; border-radius:6px; box-shadow:0 8px 24px rgba(14,37,67,0.10); display:flex; align-items:flex-end; justify-content:center; padding-bottom:4px;"><span class="hex">3</span></div>
    <div style="width:88px; height:60px; background:#fff; border-radius:6px; box-shadow:0 18px 48px rgba(14,37,67,0.14); display:flex; align-items:flex-end; justify-content:center; padding-bottom:4px;"><span class="hex">4</span></div>
  </div>
</body></html>
