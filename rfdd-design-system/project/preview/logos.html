<!doctype html>
<!-- @dsCard group="Brand" name="Logo lockups" subtitle="Color, mono-dark, emblem, stacked" viewport="700x280" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="label">Logo · primary lockup</div>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
    <div style="background:#F7F6F2; border:1px solid #DEE2E8; border-radius:6px; padding:24px; display:flex; align-items:center; justify-content:center; min-height:120px;">
      <img src="../assets/logo.png" alt="RFDD" style="max-width:280px; height:auto;">
    </div>
    <div style="background:#FFFFFF; border:1px solid #DEE2E8; border-radius:6px; padding:24px; display:flex; align-items:center; justify-content:center; min-height:120px;">
      <img src="../assets/logo.png" alt="RFDD" style="max-width:280px; height:auto;">
    </div>
    <div style="background:#0E2543; border-radius:6px; padding:24px; display:flex; align-items:center; justify-content:center; min-height:120px;">
      <img src="../assets/logo.png" alt="RFDD" style="max-width:280px; height:auto; filter:brightness(0) invert(1);">
    </div>
    <div style="background:#EDF3F8; border-radius:6px; padding:24px; display:flex; align-items:center; justify-content:center; min-height:120px;">
      <img src="../assets/logo.png" alt="RFDD" style="max-width:240px; height:auto;">
    </div>
  </div>
  <div class="hex" style="margin-top:10px;">Backgrounds: paper · white · navy (knockout) · sky-100. Reverse uses CSS filter to invert pixels of the original PNG.</div>
</body></html>
