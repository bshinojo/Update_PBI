name: CI

# Corre en cada push y PR a main. Dos jobs en paralelo (frontend / backend):
# si algo rompe el typecheck, los tests, el lint o el build, el commit queda en rojo.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      # Los tests son herméticos (FakeDataSource + scheduler apagado vía conftest):
      # corren sin credenciales ni red.
      - run: pytest -q
